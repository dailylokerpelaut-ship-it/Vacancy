<script>
const SHEET_ID   = "1_v2qiyNaflStIn5V1VtHS4L_JWVz9zlKfZTAvQcVRO8";
const SHEET_TAB  = "WebsiteJobsGrouped";
const EXPIRE_DAYS = 7;
const SCAM_REPORT_URL = "https://forms.gle/f7dDubMXKZGPNaQW9";

function cell(row, index){ return row.c[index]?.v?.toString() || ""; }
function parseTimestamp(v){
  try{
    const m=String(v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
    if(m)return new Date(+m[1],+m[2],+m[3],+m[4],+m[5],+m[6]).toISOString();
    return new Date(v).toISOString();
  }catch(e){return new Date().toISOString()}
}
function safeJSON(str){try{return JSON.parse(str||"[]")}catch(e){return []}}
function countOpenings(sections){return (sections||[]).reduce((s,sec)=>s+((sec.items||[]).length),0)}
function parseSalaryNumberToken(token){
  if(!token) return null;

  let t = String(token).trim();
  const sepCount = (t.match(/[.,]/g) || []).length;

  if(sepCount > 1){
    return Number(t.replace(/[.,]/g, ""));
  }

  if(/[.,]/.test(t)){
    const parts = t.split(/[.,]/);
    if(parts[1] && parts[1].length === 3){
      return Number(parts.join(""));
    }
    return Number(t.replace(",", "."));
  }

  return Number(t);
}

function detectSalaryCurrency(raw, amount){
  const s = String(raw || "").toLowerCase();

  if(/s\$|sgd|singapore dollar/.test(s)) return "SGD";
  if(/us\$|usd|\$/.test(s)) return "USD";
  if(/rp|idr|rupiah|juta|jt/.test(s)) return "IDR";
  if(/\brm\b|myr|ringgit/.test(s)) return "MYR";
  if(/eur|€/.test(s)) return "EUR";
  if(/php|peso/.test(s)) return "PHP";

  // Inferensi aman untuk format Indonesia: 5.000.000 / 5,000,000 / 5000000.
  if(Number(amount) >= 1000000) return "IDR";

  return "";
}

function formatSalaryAmount(currency, amount){
  if(!Number.isFinite(amount) || amount <= 0) return "";

  if(currency === "IDR") return `IDR ${Math.round(amount).toLocaleString("id-ID")}`;
  if(currency === "USD") return `USD ${Math.round(amount).toLocaleString("en-US")}`;
  if(currency === "SGD") return `SGD ${Math.round(amount).toLocaleString("en-US")}`;
  if(currency === "MYR") return `MYR ${Math.round(amount).toLocaleString("en-US")}`;
  if(currency === "EUR") return `EUR ${Math.round(amount).toLocaleString("en-US")}`;
  if(currency === "PHP") return `PHP ${Math.round(amount).toLocaleString("en-US")}`;

  return `${Math.round(amount).toLocaleString("en-US")} (currency not stated)`;
}

function parseSalaryEntry(raw){
  const original = String(raw || "").trim();

  if(
    !original ||
    original === "-" ||
    original === "—" ||
    /negotiable|nego|to be discussed|tba|discuss|sesuai pengalaman/i.test(original)
  ){
    return null;
  }

  const lower = original.toLowerCase();

  // Format Indonesia: 5 juta / 5 jt / 5.5 juta.
  const jutaMatch = lower.match(/(\d+(?:[.,]\d+)?)\s*(jt|juta)\b/);
  if(jutaMatch){
    const amount = Number(jutaMatch[1].replace(",", ".")) * 1000000;
    return {
      currency: "IDR",
      amount,
      maxAmount: amount
    };
  }

  const numberMatches = original.match(/\d[\d.,]*/g);
  if(!numberMatches || !numberMatches.length) return null;

  const amounts = numberMatches
    .map(parseSalaryNumberToken)
    .filter(n => Number.isFinite(n) && n > 0);

  if(!amounts.length) return null;

  const min = Math.min(...amounts);
  const max = Math.max(...amounts);
  const currency = detectSalaryCurrency(original, max);

  return {
    currency,
    amount: min,
    maxAmount: max
  };
}

function salaryRangeText(sections){
  const parsed = [];

  (sections || []).forEach(sec => {
    (sec.items || []).forEach(item => {
      const salary = parseSalaryEntry(item.salary);
      if(salary) parsed.push(salary);
    });
  });

  if(!parsed.length) return "Negotiable";

  const grouped = {};

  parsed.forEach(s => {
    const key = s.currency || "UNKNOWN";
    if(!grouped[key]) grouped[key] = [];
    if(Number.isFinite(s.amount)) grouped[key].push(s.amount);
    if(Number.isFinite(s.maxAmount)) grouped[key].push(s.maxAmount);
  });

  const output = Object.entries(grouped).map(([currency, amounts]) => {
    const cleanAmounts = amounts.filter(n => Number.isFinite(n) && n > 0);
    if(!cleanAmounts.length) return "";

    const min = Math.min(...cleanAmounts);
    const max = Math.max(...cleanAmounts);
    const currencyLabel = currency === "UNKNOWN" ? "" : currency;

    if(min === max) return formatSalaryAmount(currencyLabel, min);

    const minText = formatSalaryAmount(currencyLabel, min);
    const maxText = formatSalaryAmount(currencyLabel, max).replace(/^[A-Z]{3}\s/, "");

    return `${minText} – ${maxText}`;
  }).filter(Boolean);

  return output.length ? output.join(" · ") : "Negotiable";
}
function escapeHTML(v){
  return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function getParam(name){return new URLSearchParams(location.search).get(name)||""}
function isExpired(ts){return (new Date()-new Date(ts))/864e5>EXPIRE_DAYS}

async function loadDetail(){
  const id=getParam("id");
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}`;
  const res=await fetch(url);
  const txt=await res.text();
  const json=JSON.parse(txt.substring(47).slice(0,-2));
  const rows=json.table.rows||[];
  const jobs=rows
    .filter(r=>cell(r,1).toUpperCase()==="APPROVED")
    .map((r,i)=>{
      const sections=safeJSON(cell(r,11));
      return{
        id:String(i),
        timestamp:parseTimestamp(cell(r,0)),
        batchId:cell(r,2),
        company:cell(r,3),
        whatsapp:cell(r,4),
        email:cell(r,5),
        urgent:cell(r,6).toLowerCase()==="ya",
        free:cell(r,7).toLowerCase()!=="tidak",
        joinInfo:cell(r,8),
        summary:cell(r,9),
        featured:cell(r,10).toLowerCase()==="ya",
        sections,
        requirements:cell(r,12).split("|").map(s=>s.trim()).filter(Boolean),
        searchText:cell(r,13),
        rawInput:cell(r,14)
      }
    })
    .filter(j=>j.company&&!isExpired(j.timestamp));
  const job=jobs.find(j=>(j.batchId&&j.batchId===id)||j.id===id) || jobs[0];
  render(job);
}


function hasValue(v){
  const s = String(v || "").trim();
  return !!s && s !== "-" && s !== "—";
}
function sectionTableHTML(sec){
  const items = sec.items || [];
  const showSalary = items.some(item => hasValue(item.salary));
  const showContract = items.some(item => hasValue(item.contract));
  const showNote = items.some(item => hasValue(item.note));

  return `
    <table class="job-table">
      <thead>
        <tr>
          <th>Posisi</th>
          ${showSalary ? `<th>Gaji</th>` : ""}
          ${showContract ? `<th>Kontrak</th>` : ""}
          ${showNote ? `<th>Keterangan</th>` : ""}
        </tr>
      </thead>
      <tbody>
        ${items.map(item=>`
          <tr>
            <td><strong>${escapeHTML(item.title||"")}</strong></td>
            ${showSalary ? `<td>${escapeHTML(hasValue(item.salary) ? item.salary : "—")}</td>` : ""}
            ${showContract ? `<td>${escapeHTML(hasValue(item.contract) ? item.contract : "—")}</td>` : ""}
            ${showNote ? `<td>${escapeHTML(hasValue(item.note) ? item.note : "—")}</td>` : ""}
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}
function normalizePhone(raw){
  let n = String(raw || "").normalize("NFKC").replace(/[‐‑‒–—―−]/g,"-").replace(/\D/g,"");
  if(n.startsWith("0")) n = "62" + n.slice(1);
  if(n.startsWith("8")) n = "62" + n;
  if(n.startsWith("620")) n = "62" + n.slice(3);
  return n;
}
function displayPhone(n){
  const clean = normalizePhone(n);
  if(clean.startsWith("62")) return "+" + clean;
  return clean || n;
}
function extractContacts(rawInput, primaryWhatsApp="", primaryEmail=""){
  const raw = String(rawInput || "").normalize("NFKC").replace(/[‐‑‒–—―−]/g,"-");
  const phones = [];
  const seenPhones = new Set();

  const phoneRegex = /(?:\+?62|0|8)(?:[\s\-().]*\d){8,15}(?:\s*\([^\n()]{2,60}\))?/g;
  let match;
  while((match = phoneRegex.exec(raw)) !== null){
    const matchedText = match[0].trim();
    const clean = normalizePhone(matchedText);
    if(!clean || clean.length < 10 || clean.length > 15 || seenPhones.has(clean)) continue;

    const lineStart = raw.lastIndexOf("\n", match.index) + 1;
    const lineEndPos = raw.indexOf("\n", match.index);
    const lineEnd = lineEndPos === -1 ? raw.length : lineEndPos;
    const line = raw.slice(lineStart, lineEnd).trim();

    let name = "";
    const paren = matchedText.match(/\(([^)]+)\)/);
    if(paren) name = paren[1].trim();

    if(!name){
      const before = line.slice(0, Math.max(0, line.indexOf(matchedText))).replace(/[📞☎️\-–—:|/]+/g," ").trim();
      const after = line.slice(line.indexOf(matchedText) + matchedText.length).replace(/[()📞☎️\-–—:|/]+/g," ").trim();
      const candidate = before || after;
      if(candidate && !/(contact|whatsapp|wa|chat|only|phone|telp|segera|kirim|cv)/i.test(candidate)){
        name = candidate.replace(/\s+/g," ").slice(0,60);
      }
    }

    phones.push({ number: clean, display: displayPhone(clean), name });
    seenPhones.add(clean);
  }

  const primaryClean = normalizePhone(primaryWhatsApp);
  if(primaryClean && !seenPhones.has(primaryClean)){
    phones.unshift({ number: primaryClean, display: displayPhone(primaryClean), name: "Kontak utama" });
  }

  const emails = [];
  const seenEmails = new Set();
  const emailRegex = /[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/gi;
  let em;
  while((em = emailRegex.exec(raw)) !== null){
    const email = em[0].toLowerCase();
    if(!seenEmails.has(email)){
      emails.push(email);
      seenEmails.add(email);
    }
  }
  if(primaryEmail && !seenEmails.has(primaryEmail.toLowerCase())) emails.unshift(primaryEmail);

  let address = "";
  const addressMatch = raw.match(/(?:📍|Alamat|Address|Office|Kantor)[:\s-]*([\s\S]{0,320})/i);
  if(addressMatch){
    address = addressMatch[0]
      .split(/(?:FREE OF CHARGE|Kirim CV|Send CV|Apply|Requirements|Kualifikasi)/i)[0]
      .trim()
      .replace(/\n{3,}/g,"\n\n");
  }

  return { phones, emails, address };
}
function additionalInfoHTML(j){
  const info = extractContacts(j.rawInput, j.whatsapp, j.email);
  const hasMultiplePhones = info.phones.length > 1;
  const hasMultipleEmails = info.emails.length > 1;
  const hasAny = info.phones.length || info.emails.length || info.address;
  if(!hasAny) return "";

  return `
    <div class="section-card">
      <h2>Kontak Apply & Informasi Tambahan</h2>
      <div class="extra-info-grid">
        ${info.phones.length?`
          <div class="info-list">
            ${info.phones.map((p,idx)=>`
              <div class="info-item">
                <span class="info-icon">WA</span>
                <div>
                  <strong>${escapeHTML(p.name || (idx===0 ? "WhatsApp utama" : "PIC tambahan"))}</strong>
                  <a target="_blank" rel="noopener" href="https://wa.me/${escapeHTML(p.number)}">${escapeHTML(p.display)}</a>
                </div>
              </div>
            `).join("")}
          </div>
        `:""}
        ${info.emails.length?`
          <div class="info-list">
            ${info.emails.map((email,idx)=>`
              <div class="info-item">
                <span class="info-icon">@</span>
                <div>
                  <strong>${idx===0 ? "Email utama" : "Email tambahan"}</strong>
                  <a href="mailto:${escapeHTML(email)}">${escapeHTML(email)}</a>
                </div>
              </div>
            `).join("")}
          </div>
        `:""}
                ${(hasMultiplePhones || hasMultipleEmails)?`<p class="info-note">Beberapa kontak ditemukan dari informasi lowongan asli. Silakan gunakan kontak yang paling relevan saat apply.</p>`:""}
      </div>
    </div>
  `;
}

function render(j){
  const app=document.getElementById("app");
  if(!j){
    app.innerHTML=`<div class="container empty"><strong>Lowongan tidak ditemukan</strong><p>Data belum approved atau sudah expired.</p></div>`;
    return;
  }
  const openings=countOpenings(j.sections);
  const salary=salaryRangeText(j.sections);
  const waClean=(j.whatsapp||"").replace(/\D/g,"");
  const waIntl=waClean.startsWith("0")?"62"+waClean.slice(1):waClean;
  const msg=encodeURIComponent(`Halo, saya tertarik dengan lowongan di ${j.company} yang saya lihat di Daily Loker Pelaut.`);
  const waLink=waIntl?`https://wa.me/${waIntl}?text=${msg}`:"";
  const emailLink=j.email?`mailto:${j.email}?subject=${encodeURIComponent("Lamaran / Inquiry Lowongan")}`:"";

  app.innerHTML=`
    <section class="detail-hero">
      <div class="container">
        <div class="breadcrumb">Beranda › Lowongan › ${escapeHTML(j.company)}</div>
        <div class="hero-card">
          <div class="detail-title">
            <div>
              <h1>${escapeHTML(j.company)}</h1>
              <p class="subtitle">${escapeHTML(j.summary || "Lowongan kerja pelaut terbaru")}</p>
            </div>
            <div class="badges">
              ${j.urgent?`<span class="badge badge-red">Urgent</span>`:""}
              ${j.joinInfo?`<span class="badge badge-blue">${escapeHTML(j.joinInfo)}</span>`:""}
              ${j.free?`<span class="badge badge-green">Free of Charge</span>`:""}
              ${j.featured?`<span class="badge badge-amber">Featured</span>`:""}
            </div>
          </div>
          <div class="stats">
            <div class="stat"><strong>${j.sections.length}</strong><span>Grup Lowongan</span></div>
            <div class="stat"><strong>${openings}</strong><span>Posisi Dibuka</span></div>
            <div class="stat"><strong>${escapeHTML(salary)}</strong><span>Rentang Gaji</span></div>
            <div class="stat"><strong>${j.joinInfo?escapeHTML(j.joinInfo):"Update"}</strong><span>Join Info</span></div>
          </div>
        </div>
      </div>
    </section>

    <section class="container detail-grid">
      <main class="main-stack">
        <div class="section-card">
          <h2>Daftar Lowongan</h2>
          ${(j.sections||[]).map((sec,idx)=>`
            <div class="vacancy-group">
              <div class="group-head">
                <span>${idx+1}. ${escapeHTML(sec.section_title||"General Opening")}</span>
                <span class="badge badge-blue">${(sec.items||[]).length} Posisi</span>
              </div>
              <div class="group-body">
                ${sectionTableHTML(sec)}
              </div>
            </div>
          `).join("")}
        </div>

        ${j.requirements.length?`
          <div class="section-card">
            <h2>Requirements Umum</h2>
            <ul class="check-list">${j.requirements.map(r=>`<li>${escapeHTML(r)}</li>`).join("")}</ul>
          </div>
        `:""}

        ${additionalInfoHTML(j)}
      </main>

      <aside class="sidebar">
        <div class="sidebar-card">
          <h3>Hubungi Recruiter</h3>
          ${j.whatsapp?`<div class="contact-block"><strong>WhatsApp</strong>${j.whatsapp.split("/").map(x=>`<a href="#">${escapeHTML(x.trim())}</a>`).join("")}</div>`:""}
          ${j.email?`<div class="contact-block"><strong>Email</strong>${j.email.split(/&|,/).map(x=>`<a href="#">${escapeHTML(x.trim())}</a>`).join("")}</div>`:""}
          <div class="action-stack">
            ${waLink?`<a class="btn btn-wa" target="_blank" rel="noopener" href="${waLink}">Hubungi via WhatsApp</a>`:""}
            ${emailLink?`<a class="btn btn-email" href="${emailLink}">Kirim Email</a>`:""}
          </div>
        </div>
        ${j.free?`
          <div class="sidebar-card note-card">
            <strong>FREE OF CHARGE</strong>
            <p>Recruitment process tidak dipungut biaya.</p>
          </div>
        `:""}

        <div class="sidebar-card warning-card">
          <strong>⚠️ PERHATIAN</strong>
          <p>Daily Loker Pelaut hanya membantu menampilkan informasi lowongan. Proses seleksi tetap dilakukan oleh perusahaan/recruiter terkait.</p>
          <p>Jangan transfer uang untuk alasan rekrutmen, medical, visa, sertifikat, tiket, joining, atau administrasi sebelum memastikan legalitas dan kontak resmi perusahaan.</p>
          <p>Waspada pihak yang mengatasnamakan perusahaan/recruiter. Jika ada permintaan biaya atau informasi terasa mencurigakan, segera laporkan ke Daily Loker Pelaut.</p>
          <a
            class="report-scam-link"
            href="${SCAM_REPORT_URL}"
            target="_blank"
            rel="noopener"
            data-company="${escapeHTML(j.company)}"
            data-batch-id="${escapeHTML(j.batchId || j.id)}">
            Laporkan Lowongan Mencurigakan
          </a>
        </div>
      </aside>
    </section>
  `;
}
loadDetail().catch(err=>{
  console.warn(err);
  document.getElementById("app").innerHTML=`<div class="container empty"><strong>Gagal memuat detail</strong><p>Cek koneksi atau data sheet.</p></div>`;
});
</script>
<script>
document.addEventListener("click", function (event) {
  const link = event.target.closest("a");
  if (!link) return;

  const href = link.getAttribute("href") || "";
  const text = (link.innerText || "").trim();

  const pageTitle = document.title || "Unknown Vacancy";
  const currentUrl = window.location.href;

  if (
    href.includes("wa.me") ||
    href.includes("api.whatsapp.com") ||
    href.includes("whatsapp.com/send")
  ) {
    if (typeof gtag === "function") {
      gtag("event", "apply_whatsapp_click", {
        event_category: "Apply Button",
        event_label: text || "WhatsApp Apply",
        vacancy_page: pageTitle,
        page_url: currentUrl,
        link_url: href,
        transport_type: "beacon"
      });
    }

    console.log("Tracked WhatsApp Apply:", href);
  }

  if (href.startsWith("mailto:")) {
    if (typeof gtag === "function") {
      gtag("event", "apply_email_click", {
        event_category: "Apply Button",
        event_label: text || "Email Apply",
        vacancy_page: pageTitle,
        page_url: currentUrl,
        link_url: href,
        transport_type: "beacon"
      });
    }

    console.log("Tracked Email Apply:", href);
  }

  if (link.classList.contains("report-scam-link")) {
    if (typeof gtag === "function") {
      gtag("event", "report_scam_click", {
        event_category: "Safety",
        event_label: text || "Report Scam",
        vacancy_page: pageTitle,
        company: link.dataset.company || "Unknown",
        batch_id: link.dataset.batchId || "",
        page_url: currentUrl,
        link_url: href,
        transport_type: "beacon"
      });
    }

    console.log("Tracked Scam Report:", href);
  }
});
</script>

</body>
</html>
